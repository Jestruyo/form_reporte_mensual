<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte mensual de servicio</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; line-height: 1.5; color: #1f2937; background: #f9fafb; min-height: 100vh; padding: 24px 20px; }
        .page { max-width: 560px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { margin: 0 0 8px; font-size: 1.75rem; }
        .subtitle { margin: 0; color: #6b7280; }
        .main { background: #fff; border-radius: 10px; box-shadow: 0 4px 12px rgba(0,0,0,.08); padding: 28px 24px; }
        .form-section { margin-bottom: 28px; }
        .form-section h2 { margin: 0 0 18px; font-size: 1.1rem; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }
        .field { margin-bottom: 18px; }
        .field label { display: block; margin-bottom: 6px; font-weight: 500; }
        .required { color: #dc2626; }
        .field input[type="text"], .field input[type="number"], .field select { width: 100%; padding: 12px 14px; font-size: 1rem; border: 1px solid #e5e7eb; border-radius: 8px; }
        .field input:focus, .field select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px #eff6ff; }
        .radio-group { display: flex; gap: 20px; flex-wrap: wrap; }
        .radio-label { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .radio-label input { width: 18px; height: 18px; accent-color: #2563eb; }
        .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 480px) { .fields-row { grid-template-columns: 1fr; } }
        .form-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; padding-top: 20px; border-top: 1px solid #e5e7eb; }
        .btn { padding: 12px 24px; font-size: 1rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-secondary { background: #f9fafb; color: #1f2937; border: 1px solid #e5e7eb; }
        .message { margin-top: 20px; padding: 14px 18px; border-radius: 8px; font-size: 0.95rem; }
        .message.hidden { display: none; }
        .message.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .message.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .footer { margin-top: 32px; text-align: center; font-size: 0.875rem; color: #6b7280; }
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <h1>Reporte mensual de servicio</h1>
            <p class="subtitle">Congregación Cordialidad</p>
        </header>
        <main class="main">
            <form id="reportForm" class="form" novalidate>
                <div class="form-section">
                    <h2>Datos del reporte</h2>
                    <div class="field">
                        <label for="nombre">Nombre completo <span class="required">*</span></label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Ej: María García" autocomplete="name">
                        <span class="field-error" id="errorNombre"></span>
                    </div>
                    <div class="field">
                        <label for="grupo">Grupo <span class="required">*</span></label>
                        <select id="grupo" name="grupo" required>
                            <option value="">Selecciona tu grupo</option>
                            <option value="1">Grupo 1</option>
                            <option value="2">Grupo 2</option>
                            <option value="3">Grupo 3</option>
                            <option value="4">Grupo 4</option>
                        </select>
                        <span class="field-error" id="errorGrupo"></span>
                    </div>
                    <div class="field">
                        <label>¿Predicaste este mes? <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="predico" value="Si prediqué" required><span>Sí prediqué</span></label>
                            <label class="radio-label"><input type="radio" name="predico" value="No prediqué"><span>No prediqué</span></label>
                        </div>
                        <span class="field-error" id="errorPredico"></span>
                    </div>
                    <div class="field">
                        <label for="codigo">Código de acceso (si te lo indicaron)</label>
                        <input type="text" id="codigo" name="codigo" placeholder="Opcional" autocomplete="off">
                    </div>
                </div>
                <div class="form-section">
                    <h2>Actividad del mes</h2>
                    <div class="fields-row">
                        <div class="field">
                            <label for="horas">Horas</label>
                            <input type="number" id="horas" name="horas" min="0" step="1" placeholder="0">
                        </div>
                        <div class="field">
                            <label for="revisitas">Revisitas</label>
                            <input type="number" id="revisitas" name="revisitas" min="0" step="1" placeholder="0">
                        </div>
                    </div>
                    <div class="fields-row">
                        <div class="field">
                            <label for="estudios">Estudios bíblicos</label>
                            <input type="number" id="estudios" name="estudios" min="0" step="1" placeholder="0">
                        </div>
                        <div class="field">
                            <label for="publicaciones">Publicaciones</label>
                            <input type="number" id="publicaciones" name="publicaciones" min="0" step="1" placeholder="0">
                        </div>
                    </div>
                    <div class="field">
                        <label for="supervision">Supervisión (opcional)</label>
                        <input type="text" id="supervision" name="supervision" placeholder="Comentarios o observaciones">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn btn-primary">Enviar reporte</button>
                    <button type="reset" class="btn btn-secondary">Limpiar</button>
                </div>
            </form>
            <div id="message" class="message hidden" role="alert"></div>
        </main>
        <footer class="footer">
            <p>Los datos se guardan en la hoja de reportes de la congregación.</p>
        </footer>
    </div>
    <script>
        (function() {
            var form = document.getElementById('reportForm');
            var submitBtn = document.getElementById('submitBtn');
            var messageEl = document.getElementById('message');
            var scriptUrl = window.location.href.split('?')[0];

            function showMessage(text, type) {
                messageEl.textContent = text;
                messageEl.className = 'message ' + (type === 'error' ? 'error' : 'success');
                messageEl.classList.remove('hidden');
            }
            function hideMessage() { messageEl.classList.add('hidden'); messageEl.textContent = ''; }
            function setError(id, text) { var el = document.getElementById('error' + id); if (el) el.textContent = text || ''; }
            function validate() {
                var valid = true;
                setError('Nombre', ''); setError('Grupo', ''); setError('Predico', '');
                if (!document.getElementById('nombre').value.trim()) { setError('Nombre', 'Escribe tu nombre.'); valid = false; }
                if (!document.getElementById('grupo').value) { setError('Grupo', 'Selecciona tu grupo.'); valid = false; }
                if (!document.querySelector('input[name="predico"]:checked')) { setError('Predico', 'Indica si predicaste.'); valid = false; }
                return valid;
            }
            function getData() {
                var num = function(id) { var v = document.getElementById(id).value.trim(); return v === '' ? '' : (parseInt(v, 10) || 0); };
                var data = {
                    nombre: document.getElementById('nombre').value.trim(),
                    grupo: document.getElementById('grupo').value,
                    predico: (document.querySelector('input[name="predico"]:checked') || {}).value || '',
                    horas: num('horas'),
                    revisitas: num('revisitas'),
                    estudios: num('estudios'),
                    publicaciones: num('publicaciones'),
                    supervision: document.getElementById('supervision').value.trim()
                };
                var codigoEl = document.getElementById('codigo');
                if (codigoEl && codigoEl.value.trim()) data.codigo = codigoEl.value.trim();
                return data;
            }
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                hideMessage();
                if (!validate()) { showMessage('Completa los campos obligatorios.', 'error'); return; }
                var data = getData();
                var params = new URLSearchParams();
                for (var k in data) params.append(k, data[k] === undefined || data[k] === null ? '' : data[k]);
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviando…';
                fetch(scriptUrl, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() })
                    .then(function(r) { return r.text(); })
                    .then(function(text) {
                        var result = { ok: false, message: text };
                        try { result = JSON.parse(text); } catch (_) {}
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Enviar reporte';
                        if (result.ok) { showMessage(result.message || 'Reporte enviado correctamente.', 'success'); form.reset(); }
                        else { showMessage(result.message || 'Error al guardar.', 'error'); }
                    })
                    .catch(function(err) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Enviar reporte';
                        showMessage('Error de conexión. ' + (err.message || ''), 'error');
                    });
            });
            form.addEventListener('reset', function() { hideMessage(); setError('Nombre', ''); setError('Grupo', ''); setError('Predico', ''); });
        })();
    </script>
</body>
</html>
